
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@v4
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro':
          distribution: goreleaser
          version: latest
          args: release --skip=publish --config .goreleaser-linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: birdwatcher-linux
          path: |
            dist/birdwatcher*
            dist/checksums.txt

  merge-and-release:
    needs: [build-linux-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Make directories
        run: |
          mkdir -p ./birdwatcher-build/linux
      - name: Download linux binaries
        uses: actions/download-artifact@v4.1.3
        with:
          name: birdwatcher-linux
          path: ./birdwatcher-build/linux      
      - name: Merge checksum file
        run: |
          cd ./birdwatcher-build
          cat ./linux/checksums.txt >> checksums.txt
          rm ./linux/checksums.txt
      - name: Check git status
        run: |
          tree
          git status
      - name: Release
        uses: goreleaser/goreleaser-action@v4
        with:
          args: release --clean --config .goreleaser-release.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} 